<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品原型演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-content {
            width: 100%;
            margin: 0;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            padding: 14px 0;
            white-space: nowrap;
        }

        .tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            margin-left: 20px;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            padding: 14px 20px;
            background: none;
            border: none;
            font-size: 15px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 500;
        }

        .tab-btn:hover:not(.active) {
            color: #334155;
            background: #f8fafc;
        }

        .content-area {
            flex: 1;
            width: 100%;
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .prototype-frame {
            flex: 1;
            width: 100%;
            min-height: 0;
            border: none;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        footer {
            text-align: center;
            padding: 8px;
            color: #94a3b8;
            font-size: 11px;
            background: #f1f5f9;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .nav-content {
                padding: 0 12px;
            }

            .logo {
                font-size: 16px;
            }

            .tab-btn {
                padding: 10px 12px;
                font-size: 13px;
            }

            .content-area {
                padding: 8px;
            }
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="nav-content">
            <div class="logo">产品原型演示</div>
            <div class="tabs" id="tabsContainer"></div>
        </div>
    </div>

    <div class="content-area">
        <iframe class="prototype-frame" id="prototypeFrame" title="原型展示"></iframe>
    </div>

    <footer>仅供预览 | 如有问题请联系产品经理</footer>

    <script>
        const PAGES = [
            { name: '用户洞察', file: 'userinsight.html?v=20260602-22' },
            { name: '交互说明', file: 'interaction_docs.html' },
        ];

        let currentTab = 0;

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = '';
            PAGES.forEach((page, index) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (index === currentTab ? ' active' : '');
                btn.textContent = page.name;
                btn.onclick = () => setActiveTab(index);
                container.appendChild(btn);
            });
        }

        function setActiveTab(index) {
            currentTab = index;
            renderTabs();
            document.getElementById('prototypeFrame').src = PAGES[index].file;
        }

        setActiveTab(0);
    </script>

</body>

</html>
